services:
  auth_db:
    restart: always
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
        - ${POSTGRES_PORT}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      PGUSER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - auth
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}"]
      retries: 20
      timeout: 3s
      interval: 2s
  auth_service:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth_service
    expose:
      - 8080
    ports:
      - 8080:8080
    depends_on:
      auth_db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_DB}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      MAIL_KEY: ${MAIL_KEY}
      SESSION_KEY: ${SESSION_KEY}
      JWT_PRIV_KEY: ${JWT_PRIV_KEY}
      JWT_PUB_KEY: ${JWT_PUB_KEY}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
    networks:
        - auth

volumes:
  postgres_data:
    name: postgres_data

networks:
  auth:
    driver: bridge
