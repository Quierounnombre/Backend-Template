# EXAMPLE OF A CONFIG

#This needs to be a string stating with :
port: ":8080"
release_mode: "debug" #switch to "release" in prod
frontend: "https://localhost:8080" #Your frontend path(for OAuth)

db:
  max_cons: 4 #Max simultaneous cons
  min_cons: 1 #Min cons active
  min_idle_cons: 1 #Min cons that are idle
  health_check_period: "1m"
  max_con_lifetime: "5m"
  max_con_lifetime_jitter: "1m"
  max_con_idle_time: "3m"
  ctx_timeout: "15s" #Max time waiting for a call to the db

#Standar CORS settings, prety self explicatory
cors:
  allow_all_origins: false
  allow_private_network: false
  allow_credentials: true
  allow_wildcard: false
  allow_browser_extensions: false
  allow_websockets: false
  allow_files: false
  allow_origins:
    - "https://backend-template-production.up.railway.app"
  allow_methods:
    - "GET"
    - "POST"
  allow_headers:
    - "Authorization"
    - "Content-Type"
  max_age: "12h"
  options_response_status: 204

#Standar JWT settings
jwt:
  realm: "Backend API"
  timeout: "15m"
  max_refresh: "8h"
  token_lookup: "header: Authorization, query: token, cookie: jwt"
  token_head_name: "Bearer"
  send_cookie: true
  secure_cookie: true
  cookie_same_site: 4  # 1=Default 2=Lax 3=Strict 4=None
  cookie_http_only: true
  cookie_max_age: "15m"
  cookie_domain: ""
  send_authorization: true

#Oauth paths, atm is hard coded, but change the paths to this
oauth:
  provider: "https://accounts.google.com/o/oauth2/auth"
  token_provider: "https://oauth2.googleapis.com/token"
  redirect_uri: "https://backend-template-production.up.railway.app/OAuthCallback"

#Amount of request per IP and when to update them.
rate:
  max_request: 50
  reset_interval: 2m

logger:
  path: "tmp/test.log" #Path where the file is located
  level: "info" #Which level would be filtrated, levels = debug, info, warn, error
  max_size: 200 #Size in MB
  max_age: 7 #Numbers of days in storage
  max_backups: 4 #Number of backups allowed
  local_time: true #False = UTC, true = machine zone.
  compress: false #If this should compress the logs
  source: true #DEBUG info for leaving the entrypoint for a logging action

#Mail, quite simple, add a provider, and the mail that would send the emails
mail:
  provider: "smtp.mailgun.org"
  user: "MailTest@sandbox3559960e87ba466eb56a024ece83cb47.mailgun.org"
